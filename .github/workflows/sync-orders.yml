name: Sync KiotViet Orders

env:
  # GitHub-hosted runners are deprecating Node.js 20 for JavaScript actions.
  # Opt into Node.js 24 now to avoid future breakage/warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: sync-orders-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync orders (${{ github.ref_name }})
    runs-on: ubuntu-latest

    # Use GitHub Environments to separate secrets for develop vs prod.
    environment: ${{ (github.ref_name == 'main') && 'prod' || 'develop' }}

    timeout-minutes: ${{ (github.ref_name == 'main') && 30 || 5 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write Google service account key
        shell: bash
        run: |
          mkdir -p .secrets
          # Secret must contain the full JSON content
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}' > .secrets/kiotviet-service-account.json

      - name: Run sync
        env:
          # KiotViet
          KIOTVIET_BASE_URL: ${{ vars.KIOTVIET_BASE_URL }}
          KIOTVIET_USERNAME: ${{ secrets.KIOTVIET_USERNAME }}
          KIOTVIET_PASSWORD: ${{ secrets.KIOTVIET_PASSWORD }}

          # Browser
          HEADLESS: 'true'
          SLOW_MO_MS: '0'
          TIMEOUT_MS: ${{ vars.TIMEOUT_MS || '45000' }}

          # Orders
          ORDERS_URL: ${{ vars.ORDERS_URL }}
          ORDERS_TIME_PRESET: ${{ vars.ORDERS_TIME_PRESET || 'Hôm nay' }}
          ORDERS_POLL_INTERVAL_MS: ${{ vars.ORDERS_POLL_INTERVAL_MS || '10000' }}
          ORDERS_EXPORT_TIMEOUT_MS: ${{ vars.ORDERS_EXPORT_TIMEOUT_MS || '30000' }}
          # Run exactly one scan/export pass per workflow run.
          # If there are new orders, the run exports/uploads them and exits.
          # If there are no new orders, the run exits quickly.
          ORDERS_MAX_POLLS: ${{ vars.ORDERS_MAX_POLLS || '1' }}
          # Develop safeguard: stop the watcher after ~5 minutes.
          # Prod can override via vars or keep unlimited (0).
          ORDERS_MAX_RUN_MS: ${{ vars.ORDERS_MAX_RUN_MS || ((github.ref_name == 'main') && '0' || '300000') }}
          ORDERS_DELETE_DOWNLOADED_AFTER_UPLOAD: ${{ vars.ORDERS_DELETE_DOWNLOADED_AFTER_UPLOAD || 'true' }}

          # Google Sheets
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB_NAME: ${{ vars.GOOGLE_SHEET_TAB_NAME }}
          GOOGLE_SERVICE_ACCOUNT_KEY_FILE: .secrets/kiotviet-service-account.json

        run: npm run sync -- orders

      - name: Upload debug artifacts (.storage)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.ref_name }}-${{ github.run_id }}
          path: |
            .storage/**/*.png
            .storage/**/*.html
            .storage/**/*.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 7
